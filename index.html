<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
    >

    <title>Taumcraft</title>

    <!-- CSS -->

    <link
    rel="stylesheet"
    href="style.css"
    >

    <!-- SWIPER CSS -->

    <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />

    <!-- PARTICLES -->

    <script
    src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js">
    </script>

</head>

<body>

    <!-- LOADING -->

    <div id="loading">
        <img src="Imagem/Logo.jpg" alt="Logo" id="loadingLogo">
        <h1>Taumcraft</h1>

        <p>Loading...</p>

    </div>

    <!-- PARTICLES -->

    <div id="tsparticles"></div>

    <!-- BOTAO TEMA -->

    <button id="temaBtn">

        ☀️

    </button>

    <!-- BOTAO TOPO -->

    <button id="topoBtn">

        ↑

    </button>

    <!-- BANNER -->

    <div class="banner"></div>

    <!-- HEADER -->

    <header>

        <img
        src="Imagem/Logo.jpg"
        alt="Logo"
        id="Logo"
        >

        <h1>Taumcraft</h1>

        <!-- CONTADOR -->

        <div class="contador">

            <span id="subs">

                Carregando...

            </span>

        </div>

        <!-- SUBTEXTO -->

        <p class="subtexto">

            Minecraft • Mods • Survival

        </p>

    </header>

    <!-- MAIN -->

    <main>

        <!-- VIDEO DESTAQUE -->

        <section class="destaque">

            <h2>ÚLTIMO VÍDEO</h2>

            <div id="videoDestaque"></div>

        </section>

        <!-- VIDEOS -->

        <section class="videos">

            <div class="topo">

                <h2>ÚLTIMOS VÍDEOS</h2>

                <a
                href="https://www.youtube.com/@taumcraft/videos"
                target="_blank"
                >

                    Ver todos

                </a>

            </div>

            <!-- SWIPER -->

            <div class="swiper mySwiper">

                <div
                class="swiper-wrapper"
                id="videosContainer">

                </div>

            </div>

        </section>

        <!-- LINKS -->

        <section class="links">

            <!-- YOUTUBE -->

            <a
            href="https://www.youtube.com/@taumcraft"
            target="_blank"
            class="botao"
            >

                <div class="icone">

                    <img
                    src="Imagem/youtube.png"
                    alt="YouTube"
                    >

                </div>

                <div class="texto">

                    <h3>YouTube</h3>

                    <p>

                        Assista os vídeos do canal

                    </p>

                </div>

                <div class="seta">

                    ›

                </div>

            </a>

            <!-- DISCORD -->

            <a
            href="#"
            class="botao"
            >

                <div class="icone">

                    <img
                    src="Imagem/discordia.png"
                    alt="Discord"
                    >

                </div>

                <div class="texto">

                    <h3>Discord</h3>

                    <p>

                        Entre na comunidade

                    </p>

                </div>

                <div class="seta">

                    ›

                </div>

            </a>

            <!-- INSTAGRAM -->

            <a
            href="https://www.instagram.com/taum_craft/"
            target="_blank"
            class="botao"
            >

                <div class="icone">

                    <img
                    src="Imagem/instagram.png"
                    alt="Instagram"
                    >

                </div>

                <div class="texto">

                    <h3>Instagram</h3>

                    <p>

                        Siga nas redes sociais

                    </p>

                </div>

                <div class="seta">

                    ›

                </div>

            </a>

        </section>

    </main>

    <!-- FOOTER -->

    <footer>

        <p>

            © 2026 Taumcraft • Todos os direitos reservados

        </p>

    </footer>

    <!-- SWIPER JS -->

    <script
    src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js">
    </script>

    <!-- MAIN JS -->

    <script src="main.js"></script>

</body>

</html>
