<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Taumcraft</title>

    <!-- CSS -->

    <link rel="stylesheet" href="style.css">

    <!-- SWIPER CSS -->

    <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />

</head>

<body>

    <!-- HEADER -->

    <header>

        <img
        src="Imagem/Logo.jpg"
        alt="Logo"
        id="Logo"
        >

        <h1>Taumcraft</h1>

        <div class="contador">

            <span id="subs">
                Carregando...
            </span>

        </div>

        <button id="temaBtn">

    ☀️

</button>
    </header>

    <!-- MAIN -->

    <main>

        <!-- VIDEOS -->

        <section class="videos">

            <div class="topo">

                <h2>ÚLTIMOS VÍDEOS</h2>

            </div>

            <!-- SWIPER -->

            <div class="swiper mySwiper">

                <div
                class="swiper-wrapper"
                id="videosContainer">

                </div>

            </div>

        </section>

        <!-- LINKS -->

        <section class="links">

            <!-- YOUTUBE -->

            <a
            href="https://www.youtube.com/@taumcraft"
            target="_blank"
            class="botao"
            >

                <div class="icone">

                    <img
                    src="Imagem/youtube.png"
                    alt="YouTube"
                    >

                </div>

                <div class="texto">

                    <h3>YouTube</h3>

                    <p>
                        Assista os vídeos do canal
                    </p>

                </div>

                <div class="seta">
                    ›
                </div>

            </a>

            <!-- DISCORD -->

            <a
            href="#"
            class="botao"
            >

                <div class="icone">

                    <img
                    src="Imagem/discordia.png"
                    alt="Discord"
                    >

                </div>

                <div class="texto">

                    <h3>Discord</h3>

                    <p>
                        Entre na comunidade
                    </p>

                </div>

                <div class="seta">
                    ›
                </div>

            </a>

            <!-- INSTAGRAM -->

            <a
            href="https://www.instagram.com/taum_craft/"
            target="_blank"
            class="botao"
            >

                <div class="icone">

                    <img
                    src="Imagem/instagram.png"
                    alt="Instagram"
                    >

                </div>

                <div class="texto">

                    <h3>Instagram</h3>

                    <p>
                        Siga nas redes sociais
                    </p>

                </div>

                <div class="seta">
                    ›
                </div>

            </a>

        </section>

    </main>

    <!-- FOOTER -->

    <footer>

    </footer>

    <!-- SWIPER JS -->

    <script
    src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js">
    </script>

    <!-- MAIN JS -->

    <script src="main.js"></script>

</body>

</html>
